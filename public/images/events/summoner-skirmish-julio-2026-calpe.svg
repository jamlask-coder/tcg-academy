<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1536" role="img" aria-label="Saturday Afternoon Summoner Skirmish — Julio 2026 — TCG Academy Calpe">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1136"/>
      <stop offset="55%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#040214"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="footerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0d33" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0c0620" stop-opacity="0.95"/>
    </linearGradient>
    <pattern id="hex" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
      <path d="M60 4 L112 32 L112 84 L60 112 L8 84 L8 32 Z" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- ── Fondo ─────────────────────────────────────────────────────── -->
  <rect width="1024" height="1536" fill="url(#bg)"/>
  <rect width="1024" height="1536" fill="url(#hex)"/>
  <rect width="1024" height="1536" fill="url(#glow)"/>

  <!-- Línea de acento superior -->
  <rect x="0" y="0" width="1024" height="6" fill="#a855f7"/>
  <rect x="0" y="9" width="1024" height="1" fill="#a855f7" fill-opacity="0.35"/>

  <!-- ── Cabecera ──────────────────────────────────────────────────── -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
    <text x="64" y="78" fill="#a3a3b8" font-size="20" font-weight="700" letter-spacing="6">TCG ACADEMY · CALPE</text>
    <text x="960" y="78" fill="#a855f7" font-size="20" font-weight="700" letter-spacing="6" text-anchor="end">RIFTBOUND TCG</text>
    <line x1="64" y1="100" x2="960" y2="100" stroke="#581c87" stroke-opacity="0.5" stroke-width="1"/>
  </g>

  <!-- ── Marca decorativa central (hexágonos concéntricos) ─────────── -->
  <g transform="translate(512 470)" stroke="#a855f7" fill="none" stroke-linejoin="round">
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90" stroke-opacity="0.55" stroke-width="2"/>
    <polygon points="0,-130 113,-65 113,65 0,130 -113,65 -113,-65" stroke-opacity="0.40" stroke-width="1.5"/>
    <polygon points="0,-86 75,-43 75,43 0,86 -75,43 -75,-43" stroke-opacity="0.30" stroke-width="1.2"/>
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" stroke-opacity="0.85" stroke-width="1.5" fill="#a855f7" fill-opacity="0.18"/>
    <text x="0" y="14" fill="#e9d5ff" font-family="'Georgia', 'Times New Roman', serif" font-size="44" font-weight="700" text-anchor="middle">S</text>
  </g>

  <!-- ── Etiqueta edición ──────────────────────────────────────────── -->
  <g transform="translate(512 770)">
    <rect x="-95" y="-26" width="190" height="44" rx="22" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-opacity="0.55" stroke-width="1"/>
    <text x="0" y="6" fill="#e9d5ff" font-family="'Inter', sans-serif" font-size="18" font-weight="800" letter-spacing="6" text-anchor="middle">EDICIÓN · JULIO</text>
  </g>

  <!-- ── Título principal ──────────────────────────────────────────── -->
  <g font-family="'Georgia', 'Times New Roman', serif" text-anchor="middle">
    <text x="512" y="900" fill="url(#titleStroke)" font-size="98" font-weight="900" letter-spacing="-1">Summoner</text>
    <text x="512" y="1000" fill="url(#titleStroke)" font-size="98" font-weight="900" letter-spacing="-1">Skirmish</text>
  </g>

  <!-- Línea bajo título -->
  <line x1="412" y1="1042" x2="612" y2="1042" stroke="#a855f7" stroke-width="2"/>

  <!-- Subtítulo -->
  <text x="512" y="1090" fill="#a3a3b8" font-family="'Inter', sans-serif" font-size="18" font-weight="700" letter-spacing="10" text-anchor="middle">TORNEO SEMANAL · CONSTRUIDO</text>

  <!-- Frase corta -->
  <text x="512" y="1170" fill="#7c6f9b" font-family="'Inter', sans-serif" font-size="16" font-weight="500" letter-spacing="2" text-anchor="middle">Trae tu mazo. Lleva un sobre por victoria.</text>

  <!-- ── Bloque inferior con datos clave ───────────────────────────── -->
  <g transform="translate(64 1320)">
    <rect x="0" y="0" width="896" height="160" rx="16" fill="url(#footerBg)" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
    <line x1="224" y1="32" x2="224" y2="128" stroke="#581c87" stroke-opacity="0.55" stroke-width="1"/>
    <line x1="448" y1="32" x2="448" y2="128" stroke="#581c87" stroke-opacity="0.55" stroke-width="1"/>
    <line x1="672" y1="32" x2="672" y2="128" stroke="#581c87" stroke-opacity="0.55" stroke-width="1"/>

    <!-- Fecha -->
    <text x="112" y="55" fill="#a855f7" font-family="'Inter', sans-serif" font-size="13" font-weight="800" letter-spacing="4" text-anchor="middle">FECHA</text>
    <text x="112" y="100" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800" text-anchor="middle">SÁB · 27 JUN</text>
    <text x="112" y="125" fill="#a3a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="500" text-anchor="middle">2026</text>

    <!-- Hora -->
    <text x="336" y="55" fill="#a855f7" font-family="'Inter', sans-serif" font-size="13" font-weight="800" letter-spacing="4" text-anchor="middle">HORA</text>
    <text x="336" y="100" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800" text-anchor="middle">17:00</text>
    <text x="336" y="125" fill="#a3a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="500" text-anchor="middle">acreditación 16:30</text>

    <!-- Plazas -->
    <text x="560" y="55" fill="#a855f7" font-family="'Inter', sans-serif" font-size="13" font-weight="800" letter-spacing="4" text-anchor="middle">PLAZAS</text>
    <text x="560" y="100" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800" text-anchor="middle">24</text>
    <text x="560" y="125" fill="#a3a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="500" text-anchor="middle">por sorteo si excede</text>

    <!-- Entrada -->
    <text x="784" y="55" fill="#a855f7" font-family="'Inter', sans-serif" font-size="13" font-weight="800" letter-spacing="4" text-anchor="middle">ENTRADA</text>
    <text x="784" y="100" fill="#ffffff" font-family="'Inter', sans-serif" font-size="32" font-weight="800" text-anchor="middle">8 €</text>
    <text x="784" y="125" fill="#a3a3b8" font-family="'Inter', sans-serif" font-size="14" font-weight="500" text-anchor="middle">incluye sobre base</text>
  </g>
</svg>
