<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 490" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">

  <!-- ── Outer shield ─────────────────────────────────────────────── -->
  <path stroke-width="7"
    d="M250,26
       C265,26 310,40 370,65 L432,92
       L432,295
       C432,370 355,430 280,458 L250,470
       L220,458 C145,430 68,370 68,295
       L68,92 L130,65
       C190,40 235,26 250,26 Z"/>

  <!-- ── Inner border (inset ~30px) ──────────────────────────────── -->
  <path stroke-width="3" opacity="0.7"
    d="M250,56
       C263,56 305,69 360,91 L402,112
       L402,290
       C402,356 332,410 265,436 L250,442
       L235,436 C168,410 98,356 98,290
       L98,112 L140,91
       C195,69 237,56 250,56 Z"/>

  <!-- ── Playing cards (fanned) ────────────────────────────────── -->
  <!-- Left card, tilted −28° -->
  <rect x="182" y="148" width="52" height="76" rx="7" stroke-width="3"
        transform="rotate(-28 208 186)"/>
  <!-- Center card -->
  <rect x="224" y="132" width="52" height="76" rx="7" stroke-width="3.5"/>
  <!-- Right card, tilted +28° -->
  <rect x="266" y="148" width="52" height="76" rx="7" stroke-width="3"
        transform="rotate(28 292 186)"/>
  <!-- Small suit marks on center card -->
  <text x="250" y="162" text-anchor="middle" font-size="18" stroke="none" fill="white" opacity="0.9">♦</text>
  <text x="250" y="194" text-anchor="middle" font-size="12" stroke="none" fill="white" opacity="0.6">TCG</text>

  <!-- ── Open book ─────────────────────────────────────────────── -->
  <!-- Spine -->
  <line x1="250" y1="280" x2="250" y2="360" stroke-width="3.5"/>
  <!-- Left page -->
  <path stroke-width="3"
    d="M250,282 Q200,268 158,282 L158,358 Q200,344 250,358"/>
  <!-- Right page -->
  <path stroke-width="3"
    d="M250,282 Q300,268 342,282 L342,358 Q300,344 250,358"/>
  <!-- Left page lines -->
  <line x1="168" y1="299" x2="244" y2="294" stroke-width="1.5" opacity="0.7"/>
  <line x1="165" y1="314" x2="244" y2="310" stroke-width="1.5" opacity="0.7"/>
  <line x1="165" y1="329" x2="244" y2="327" stroke-width="1.5" opacity="0.7"/>
  <line x1="165" y1="344" x2="244" y2="343" stroke-width="1.5" opacity="0.7"/>
  <!-- Right page lines -->
  <line x1="256" y1="294" x2="332" y2="299" stroke-width="1.5" opacity="0.7"/>
  <line x1="256" y1="310" x2="335" y2="314" stroke-width="1.5" opacity="0.7"/>
  <line x1="256" y1="327" x2="335" y2="329" stroke-width="1.5" opacity="0.7"/>
  <line x1="256" y1="343" x2="335" y2="344" stroke-width="1.5" opacity="0.7"/>

  <!-- ── Banner ribbon ───────────────────────────────────────────── -->
  <!-- Left flag/wing -->
  <path stroke-width="2.5"
    d="M85,394 L168,382 L168,422 L85,422 L100,408 Z"/>
  <!-- Right flag/wing -->
  <path stroke-width="2.5"
    d="M415,394 L332,382 L332,422 L415,422 L400,408 Z"/>
  <!-- Center rectangle -->
  <rect x="168" y="380" width="164" height="44" stroke-width="2.5"/>
  <!-- Decorative top line inside banner -->
  <line x1="175" y1="388" x2="325" y2="388" stroke-width="1" opacity="0.5"/>
  <!-- Decorative bottom line inside banner -->
  <line x1="175" y1="416" x2="325" y2="416" stroke-width="1" opacity="0.5"/>

  <!-- ── TCG ACADEMY text ───────────────────────────────────────── -->
  <text x="250" y="408"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19"
        font-weight="bold"
        letter-spacing="3"
        fill="white"
        stroke="none">TCG ACADEMY</text>

</svg>
