<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 42">
  <!-- Jolly Roger skull (simplified iconic) -->
  <circle cx="16" cy="13" r="10.5" fill="#1a1a2e" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="12" cy="11" rx="2.5" ry="2.5" fill="white"/>
  <ellipse cx="20" cy="11" rx="2.5" ry="2.5" fill="white"/>
  <circle cx="12" cy="11" r="1.2" fill="#1a1a2e"/>
  <circle cx="20" cy="11" r="1.2" fill="#1a1a2e"/>
  <!-- Nose holes -->
  <circle cx="14.5" cy="14.5" r="0.8" fill="#dc2626"/>
  <circle cx="17.5" cy="14.5" r="0.8" fill="#dc2626"/>
  <!-- Grin -->
  <path d="M10,17 Q16,21 22,17" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="12" y1="19" x2="12" y2="17.5" stroke="white" stroke-width="1"/>
  <line x1="16" y1="20" x2="16" y2="18.5" stroke="white" stroke-width="1"/>
  <line x1="20" y1="19" x2="20" y2="17.5" stroke="white" stroke-width="1"/>
  <!-- Crossbones -->
  <line x1="4" y1="25" x2="28" y2="29" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="25" x2="4" y2="29" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- ONE PIECE large bold -->
  <text x="34" y="20"
    font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-weight="900"
    font-size="17"
    fill="#dc2626"
    letter-spacing="0.5">ONE PIECE</text>
  <!-- CARD GAME smaller -->
  <text x="34" y="33"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="10"
    fill="#1a1a2e"
    letter-spacing="1.5">CARD GAME</text>
</svg>
