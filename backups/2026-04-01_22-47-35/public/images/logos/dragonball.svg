<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 42">
  <defs>
    <radialGradient id="db" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
  </defs>
  <!-- Dragon Ball (4-star) -->
  <circle cx="18" cy="19" r="15" fill="url(#db)" stroke="#C2410C" stroke-width="1.5"/>
  <!-- Highlight -->
  <ellipse cx="13" cy="13" rx="5" ry="3.5" fill="white" opacity="0.3" transform="rotate(-25 13 13)"/>
  <!-- 4-star pattern -->
  <g fill="#dc2626">
    <!-- Center star -->
    <polygon points="18,11 19.5,15.5 24,15.5 20.5,18.5 22,23 18,20.5 14,23 15.5,18.5 12,15.5 16.5,15.5" transform="scale(0.7) translate(8,5)"/>
    <!-- 3 smaller dots -->
    <circle cx="12" cy="14" r="2"/>
    <circle cx="24" cy="14" r="2"/>
    <circle cx="18" cy="24" r="2"/>
  </g>
  <!-- DRAGON BALL text -->
  <text x="38" y="19"
    font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-weight="900"
    font-size="15"
    fill="#F97316"
    stroke="#7C2D12"
    stroke-width="0.8"
    paint-order="stroke fill"
    letter-spacing="0.5">DRAGON BALL</text>
  <!-- SUPER CARD GAME smaller -->
  <text x="38" y="32"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="9.5"
    fill="#92400e"
    letter-spacing="1.5">SUPER CARD GAME</text>
</svg>
