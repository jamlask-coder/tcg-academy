<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 42">
  <defs>
    <linearGradient id="nar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- Konoha leaf symbol (detailed) -->
  <g transform="translate(2,2)">
    <circle cx="16" cy="17" r="13" fill="none" stroke="url(#nar)" stroke-width="2"/>
    <!-- Leaf shape inside -->
    <path d="M16,5 Q22,10 22,17 Q22,23 16,27 Q10,23 10,17 Q10,10 16,5 Z"
      fill="url(#nar)" opacity="0.15" stroke="url(#nar)" stroke-width="1"/>
    <!-- Center vein -->
    <line x1="16" y1="6" x2="16" y2="27" stroke="#EA580C" stroke-width="1.5"/>
    <!-- Cross veins -->
    <path d="M10,13 Q16,16 22,13" stroke="#EA580C" stroke-width="1" fill="none"/>
    <path d="M9,19 Q16,22 23,19" stroke="#EA580C" stroke-width="1" fill="none"/>
    <!-- Spiral at center (Uzumaki) -->
    <path d="M16,15 Q18,15.5 18,17 Q18,19 16,19 Q14,19 14,17 Q14,15.5 16,15"
      stroke="#EA580C" stroke-width="1.2" fill="none"/>
    <circle cx="16" cy="17" r="1.5" fill="#EA580C"/>
  </g>
  <!-- NARUTO main text -->
  <text x="36" y="26"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    fill="url(#nar)"
    stroke="#7C2D12"
    stroke-width="0.8"
    paint-order="stroke fill"
    letter-spacing="1">NARUTO</text>
  <!-- Card Game below -->
  <text x="36" y="36"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="700"
    font-size="8"
    fill="#9A3412"
    letter-spacing="2.5">CARD GAME</text>
</svg>
