<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 42">
  <defs>
    <linearGradient id="lc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Magical orb / inkwell icon -->
  <circle cx="17" cy="18" r="13" fill="url(#lc)" opacity="0.15" stroke="url(#lc)" stroke-width="1.5"/>
  <!-- Ink drop / magic symbol in center -->
  <path d="M17,6 Q22,12 22,17 Q22,22.5 17,24 Q12,22.5 12,17 Q12,12 17,6 Z" fill="url(#lc)" opacity="0.9"/>
  <!-- Star sparkle above -->
  <g transform="translate(17,6)">
    <line x1="0" y1="-4" x2="0" y2="-2" stroke="#a78bfa" stroke-width="1.2"/>
    <line x1="0" y1="2" x2="0" y2="4" stroke="#a78bfa" stroke-width="1.2"/>
    <line x1="-3" y1="0" x2="-1" y2="0" stroke="#a78bfa" stroke-width="1.2"/>
    <line x1="1" y1="0" x2="3" y2="0" stroke="#a78bfa" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="1.5" fill="#a78bfa"/>
  </g>
  <!-- Small sparkles -->
  <circle cx="7" cy="10" r="1" fill="#a78bfa" opacity="0.7"/>
  <circle cx="27" cy="9" r="1" fill="#6d28d9" opacity="0.7"/>
  <!-- DISNEY small above -->
  <text x="34" y="14"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="8"
    fill="#7c3aed"
    letter-spacing="3"
    font-style="italic">DISNEY</text>
  <!-- LORCANA main -->
  <text x="34" y="30"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-weight="900"
    font-size="20"
    fill="url(#lc)"
    letter-spacing="1"
    font-style="italic">LORCANA</text>
</svg>
