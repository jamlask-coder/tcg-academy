<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 138 40">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1060"/>
    </linearGradient>
  </defs>
  <!-- Stylized M pentagon symbol -->
  <g transform="translate(2,2)">
    <polygon points="9,2 16,2 19,9 12,16 5,9" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <polyline points="9,2 12,8 12,16" stroke="#7c3aed" stroke-width="1" fill="none"/>
    <polyline points="16,2 12,8" stroke="#7c3aed" stroke-width="1" fill="none"/>
    <line x1="5" y1="9" x2="19" y2="9" stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>
    <circle cx="12" cy="9" r="1.5" fill="#7c3aed" opacity="0.7"/>
  </g>
  <!-- MAGIC in ornate italic serif -->
  <text x="26" y="21" font-family="Georgia, 'Palatino Linotype', serif" font-weight="900" font-size="18" fill="url(#mg)" letter-spacing="1" font-style="italic" paint-order="stroke" stroke="#c4b5fd" stroke-width="0.3">MAGIC</text>
  <!-- Thin decorative rule -->
  <line x1="26" y1="25" x2="131" y2="25" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
  <!-- THE GATHERING in small spaced caps -->
  <text x="26" y="34" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="7.5" fill="#3b1f6a" letter-spacing="3">THE GATHERING</text>
</svg>
