<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 42">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0E6A2"/>
      <stop offset="40%" stop-color="#C89B3C"/>
      <stop offset="100%" stop-color="#785A28"/>
    </linearGradient>
  </defs>
  <!-- LoL-style hexagon crest -->
  <g transform="translate(2,2)">
    <polygon points="15,1 25,7 25,19 15,25 5,19 5,7" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <polygon points="15,5 21,9 21,17 15,21 9,17 9,9" fill="none" stroke="#C89B3C" stroke-width="1" opacity="0.6"/>
    <!-- Sword / blade in center -->
    <line x1="15" y1="5" x2="15" y2="21" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="15,5 17.5,11 15,10 12.5,11" fill="#C89B3C"/>
    <!-- Wings -->
    <path d="M9,13 L5,11 L7,15 Z" fill="#C89B3C" opacity="0.8"/>
    <path d="M21,13 L25,11 L23,15 Z" fill="#C89B3C" opacity="0.8"/>
  </g>
  <!-- RIFTBOUND main text -->
  <text x="34" y="21"
    font-family="Georgia, 'Palatino Linotype', 'Times New Roman', serif"
    font-weight="900"
    font-size="18"
    fill="url(#gold)"
    letter-spacing="1">RIFTBOUND</text>
  <!-- Thin rule -->
  <line x1="34" y1="24" x2="143" y2="24" stroke="#C89B3C" stroke-width="0.5" opacity="0.5"/>
  <!-- League of Legends subtitle -->
  <text x="34" y="33"
    font-family="Georgia, serif"
    font-weight="600"
    font-size="7.5"
    fill="#785A28"
    letter-spacing="2">LEAGUE OF LEGENDS</text>
</svg>
