<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 26">
  <!-- Skull crossbones simplified -->
  <circle cx="12" cy="11" r="7.5" fill="#dc2626"/>
  <!-- Eye holes -->
  <circle cx="9.5" cy="10" r="2" fill="white"/>
  <circle cx="14.5" cy="10" r="2" fill="white"/>
  <!-- Smile -->
  <path d="M8,14 Q12,17 16,14" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Crossbones -->
  <line x1="5" y1="20" x2="19" y2="24" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="20" x2="5" y2="24" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <!-- Text -->
  <text x="28" y="13" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="9" fill="#dc2626" letter-spacing="0.3">ONE PIECE</text>
  <text x="28" y="23" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="8" fill="#991b1b" letter-spacing="0.3">CARD GAME</text>
</svg>
