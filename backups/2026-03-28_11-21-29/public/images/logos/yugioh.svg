<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 26">
  <!-- Millennium Eye / pyramid shape -->
  <polygon points="12,3 21,20 3,20" fill="none" stroke="#b45309" stroke-width="2"/>
  <!-- Eye in triangle -->
  <ellipse cx="12" cy="14" rx="4" ry="2.5" fill="#fbbf24"/>
  <ellipse cx="12" cy="14" rx="2" ry="1.5" fill="#92400e"/>
  <circle cx="12" cy="14" r="0.8" fill="#1c1917"/>
  <!-- Rays -->
  <line x1="12" y1="3" x2="12" y2="1" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
  <!-- Text -->
  <text x="28" y="18" font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="12" fill="#b45309" letter-spacing="0">YU-GI-OH!</text>
</svg>
